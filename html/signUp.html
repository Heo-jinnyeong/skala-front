<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SKALA-FRONT 회원가입">
    <title>회원가입 | SKALA-FRONT</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page signup-page">
    <main class="login-shell signup-shell">
        <a class="login-brand" href="login.html" aria-label="SKALA-FRONT 로그인으로 이동">
            <span class="login-logo" aria-hidden="true">S</span>
            <strong>SKALA-FRONT</strong>
        </a>

        <section class="login-card signup-card" aria-labelledby="signup-title">
            <h1 id="signup-title">계정 만들기</h1>
            <p>몇 가지 정보만 입력하면 SKALA-FRONT를 시작할 수 있어요.</p>

            <form id="signup-form">
                <div class="signup-grid">
                    <div class="login-field">
                        <label for="userName">이름</label>
                        <input type="text" id="userName" name="userName" autocomplete="name" required placeholder="이름을 입력하세요">
                    </div>
                    <div class="login-field">
                        <label for="userEmail">이메일</label>
                        <input type="email" id="userEmail" name="userEmail" autocomplete="email" required placeholder="name@example.com">
                    </div>
                    <div class="login-field">
                        <label for="userId">아이디</label>
                        <input type="text" id="userId" name="userId" autocomplete="username" minlength="4" maxlength="15" pattern="[A-Za-z0-9_]+" required placeholder="4~15자 영문, 숫자, 밑줄">
                    </div>
                    <div class="login-field">
                        <label for="userPw">비밀번호</label>
                        <input type="password" id="userPw" name="userPw" autocomplete="new-password" minlength="8" required placeholder="8자 이상 입력">
                    </div>
                    <div class="login-field">
                        <label for="userPwConfirm">비밀번호 확인</label>
                        <input type="password" id="userPwConfirm" name="userPwConfirm" autocomplete="new-password" minlength="8" required placeholder="비밀번호를 다시 입력" aria-describedby="password-confirm-help">
                        <p id="password-confirm-help" class="input-help" aria-live="polite">위에서 입력한 비밀번호를 한 번 더 입력해 주세요.</p>
                    </div>
                </div>

                <label class="signup-agreement">
                    <input type="checkbox" required>
                    <span>서비스 이용약관 및 개인정보 처리방침에 동의합니다.</span>
                </label>

                <p id="signup-message" class="login-message" role="alert" aria-live="polite"></p>
                <button type="submit" class="login-submit">회원가입</button>
            </form>

            <p class="signup-prompt">이미 계정이 있나요? <a href="login.html">로그인</a></p>
        </section>
        <p class="login-footer">© 2026 SKALA-FRONT</p>
    </main>
    <script src="../script/signUp.js"></script>
</body>
</html>
