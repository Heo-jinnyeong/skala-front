<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SKALA-FRONT 메인 화면을 준비하고 있습니다">
    <title>메인 화면 준비 중 | SKALA-FRONT</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="../script/authGuard.js"></script>
</head>
<body class="loading-page">
    <main class="loading-content" aria-labelledby="loading-title">
        <div class="loading-logo" aria-hidden="true">
            <span>S</span>
            <i class="loading-orbit loading-orbit-blue"></i>
            <i class="loading-orbit loading-orbit-green"></i>
            <i class="loading-orbit loading-orbit-yellow"></i>
        </div>
        <p class="loading-eyebrow">SKALA-FRONT</p>
        <h1 id="loading-title">메인 Hub를 준비하고 있어요</h1>
        <p class="loading-description">나만의 워크스페이스로 이동합니다.</p>
        <div class="loading-dots" aria-hidden="true">
            <span></span><span></span><span></span>
        </div>
        <p class="visually-hidden" role="status" aria-live="polite">로그인이 완료되었습니다. 메인 Hub로 이동 중입니다.</p>
    </main>
    <script src="../script/loading.js"></script>
</body>
</html>
