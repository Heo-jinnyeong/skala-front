<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SKALA-FRONT 로그인">
    <title>로그인 | SKALA-FRONT</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">
    <main class="login-shell">
        <a class="login-brand" href="login.html" aria-label="SKALA-FRONT 로그인">
            <span class="login-logo" aria-hidden="true">S</span>
            <strong>SKALA-FRONT</strong>
        </a>

        <section class="login-card" aria-labelledby="login-title">
            <h1 id="login-title">SKALA-FRONT에 로그인</h1>
            <p>계정 정보를 입력해 과제 워크스페이스로 이동하세요.</p>

            <form id="login-form" class="login-form">
                <div class="login-field">
                    <label for="login-id">아이디</label>
                    <input type="text" id="login-id" autocomplete="username" required placeholder="아이디를 입력하세요">
                </div>
                <div class="login-field">
                    <div class="login-label-row">
                        <label for="login-password">비밀번호</label>
                        <button type="button" class="text-button" id="forgot-password">비밀번호 찾기</button>
                    </div>
                    <input type="password" id="login-password" autocomplete="current-password" required placeholder="비밀번호를 입력하세요">
                </div>
                <p id="login-message" class="login-message" role="alert" aria-live="polite"></p>
                <button type="submit" class="login-submit">로그인</button>
            </form>

            <div class="login-divider"><span>또는</span></div>
            <p class="signup-prompt">아직 계정이 없나요? <a href="signUp.html">회원가입</a></p>
        </section>
        <p class="login-footer">© 2026 SKALA-FRONT</p>
    </main>
    <script src="../script/login.js"></script>
</body>
</html>
